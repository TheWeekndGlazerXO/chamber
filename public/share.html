<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chamber Report</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,400;0,700;1,300;1,700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A08;--bg2:#111110;--bg3:#1A1A18;--bg4:#222220;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#F2EFE7;--text2:#8C8A82;--text3:#545250;
  --accent:#C8F04A;--accent2:#A8D030;--adim:rgba(200,240,74,.09);
  --red:#FF5C3A;--teal:#3AFFD4;--amber:#FFB830;
  --fd:'Syne',sans-serif;--fm:'DM Mono',monospace;--fs:'Fraunces',serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fd);-webkit-font-smoothing:antialiased;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .4s ease both}
@media print{.no-print{display:none!important}.print-break{page-break-before:always}body{background:#fff;color:#000}
  .report-card{background:#f8f8f8!important;border:1px solid #ddd!important}
  .score-ring{background:#f0f0f0!important}
  :root{--text:#000;--text2:#444;--text3:#666;--accent:#4a7c00;--bg:#fff;--bg2:#f8f8f8;--bg3:#f0f0f0}}

/* ── NAV ─────────────────────────────────── */
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,8,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;height:54px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;text-decoration:none;color:var(--text)}
.logo-hex{width:26px;height:26px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo em{color:var(--accent);font-style:normal}
.nav-actions{display:flex;align-items:center;gap:8px}
.nav-btn{font-size:12px;font-family:var(--fd);font-weight:600;padding:7px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;text-decoration:none}
.nav-btn:hover{color:var(--text);background:var(--bg3)}
.nav-btn.primary{background:var(--accent);color:#0A0A08;border-color:var(--accent)}
.nav-btn.primary:hover{background:var(--accent2)}

/* ── LOADER ──────────────────────────────── */
#loader{min-height:80vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loader-ring{width:44px;height:44px;border:2px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:11px;font-family:var(--fm);color:var(--text3)}

/* ── ERROR ───────────────────────────────── */
#error-state{min-height:80vh;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center;padding:40px}
.err-icon{font-size:40px;opacity:.4}
.err-title{font-size:18px;font-weight:700;margin-bottom:4px}
.err-sub{font-size:13px;color:var(--text2);max-width:380px;line-height:1.65}

/* ── MAIN CONTENT ────────────────────────── */
#report-content{display:none}

/* ── HERO ────────────────────────────────── */
.report-hero{background:linear-gradient(160deg,rgba(200,240,74,.07),rgba(58,255,212,.03),rgba(0,0,0,0));border-bottom:1px solid var(--border);padding:48px 32px 40px}
.hero-inner{max-width:900px;margin:0 auto}
.hero-top{display:flex;align-items:flex-start;gap:20px;margin-bottom:32px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-family:var(--fm);color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:4px 12px;margin-bottom:16px}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero-product{font-size:clamp(28px,5vw,48px);font-weight:800;letter-spacing:-.8px;line-height:1.1;margin-bottom:8px}
.hero-category{font-size:13px;font-family:var(--fm);color:var(--text3)}
.score-ring{width:100px;height:100px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid var(--border2);background:var(--bg3);flex-shrink:0;position:relative}
.score-ring::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(var(--accent) var(--score-pct,0%),transparent 0);opacity:.3;border-radius:50%}
.score-num{font-size:32px;font-weight:800;letter-spacing:-2px;font-family:var(--fs);line-height:1}
.score-label{font-size:9px;font-family:var(--fm);color:var(--text3);margin-top:2px;letter-spacing:.08em;text-transform:uppercase}

/* ── SCORE BREAKDOWN ─────────────────────── */
.score-bars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:24px}
.score-bar-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.sbi-label{font-size:10px;font-family:var(--fm);color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.sbi-val{font-size:20px;font-weight:800;letter-spacing:-1px;color:var(--accent);margin-bottom:5px;font-family:var(--fs)}
.sbi-track{height:3px;background:var(--bg5,var(--bg4));border-radius:2px;overflow:hidden}
.sbi-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--accent));border-radius:2px;transition:width 1s ease}

/* ── GRID LAYOUT ─────────────────────────── */
.report-grid{max-width:900px;margin:0 auto;padding:32px 32px 64px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.report-grid{grid-template-columns:1fr;padding:20px}}

/* ── REPORT CARDS ────────────────────────── */
.report-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.report-card.wide{grid-column:span 2}
@media(max-width:700px){.report-card.wide{grid-column:span 1}}
.rc-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700}
.rc-icon{font-size:14px}
.rc-body{padding:16px 18px}

/* ANGLES */
.angle-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.angle-item:last-child{border-bottom:none}
.angle-num{font-size:9px;font-family:var(--fm);color:var(--accent);letter-spacing:.06em;min-width:28px;padding-top:2px}
.angle-title{font-size:13px;font-weight:700;margin-bottom:3px;letter-spacing:-.2px}
.angle-desc{font-size:11px;color:var(--text2);line-height:1.6}
.angle-bar{height:2px;background:var(--bg4);border-radius:1px;margin-top:6px;overflow:hidden}
.angle-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:1px}

/* COMPETITORS */
.comp-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.comp-item:last-child{border-bottom:none}
.comp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.comp-name{font-size:13px;font-weight:700}
.comp-threat{font-size:10px;font-family:var(--fm);padding:2px 8px;border-radius:100px}
.threat-high{background:rgba(255,92,58,.12);color:var(--red)}
.threat-mid{background:rgba(255,184,48,.1);color:var(--amber)}
.threat-low{background:rgba(58,255,212,.1);color:var(--teal)}
.comp-price{font-size:11px;font-family:var(--fm);color:var(--text3);margin-bottom:3px}
.comp-gap{font-size:11px;color:var(--text2);background:var(--bg3);border-radius:5px;padding:5px 9px;border-left:2px solid var(--teal)}

/* SENTIMENT */
.sentiment-bars{margin-bottom:12px}
.sent-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sent-label{font-size:11px;color:var(--text2);width:60px;flex-shrink:0}
.sent-track{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.sent-pct{font-size:11px;font-family:var(--fm);width:36px;text-align:right;flex-shrink:0}
.themes{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.theme-tag{font-size:10px;font-family:var(--fm);padding:3px 9px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.reddit-post{background:var(--bg3);border-radius:6px;padding:9px 11px;margin-top:7px;font-size:10px;font-family:var(--fm);color:var(--text2);border-left:2px solid var(--accent);line-height:1.55}

/* INFLUENCERS */
.inf-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.inf-item:last-child{border-bottom:none}
.inf-emoji{font-size:20px;flex-shrink:0}
.inf-handle{font-size:13px;font-weight:700;margin-bottom:1px}
.inf-meta{font-size:10px;font-family:var(--fm);color:var(--text3)}
.inf-score{background:var(--adim);border:1px solid rgba(200,240,74,.2);border-radius:100px;padding:3px 9px;font-size:11px;font-family:var(--fm);color:var(--accent);font-weight:700;flex-shrink:0;margin-left:auto}

/* ACTIONS */
.action-list{list-style:none}
.action-list li{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;color:var(--text2);line-height:1.55}
.action-list li:last-child{border-bottom:none}
.action-list li::before{content:'→';color:var(--accent);flex-shrink:0;font-size:11px;margin-top:1px}

/* KEYWORDS */
.kw-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.kw-item{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.kw-word{font-size:12px;font-weight:600;margin-bottom:2px}
.kw-meta{font-size:9px;font-family:var(--fm);color:var(--text3)}
.kw-diff{display:inline-block;font-size:8px;font-family:var(--fm);font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px}
.diff-low{background:rgba(58,255,212,.1);color:var(--teal)}
.diff-med{background:rgba(255,184,48,.1);color:var(--amber)}
.diff-high{background:rgba(255,92,58,.1);color:var(--red)}

/* MARKET SIZE */
.market-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.market-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.market-num{font-size:18px;font-weight:800;letter-spacing:-1px;font-family:var(--fs);color:var(--accent);margin-bottom:3px}
.market-label{font-size:9px;font-family:var(--fm);color:var(--text3);letter-spacing:.06em;text-transform:uppercase}

/* SUMMARY */
.summary-text{font-size:14px;color:var(--text2);line-height:1.8;font-family:var(--fs);font-style:italic}

/* ── FOOTER ──────────────────────────────── */
.report-footer{border-top:1px solid var(--border);padding:24px 32px;max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-family:var(--fm);color:var(--text3);flex-wrap:gap}
.footer-cta{font-size:12px;font-weight:700;font-family:var(--fd);color:var(--text2)}
.footer-cta span{color:var(--accent)}

/* ── EXPORT TOOLBAR ──────────────────────── */
.export-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:8px}
.export-bar-label{font-size:11px;font-family:var(--fm);color:var(--text3);margin-right:4px}
</style>
</head>
<body>

<nav class="nav no-print">
  <a href="index.html" class="logo">
    <div class="logo-hex"><svg viewBox="0 0 16 16" fill="none" width="11" height="11"><polygon points="8,1 15,5 15,11 8,15 1,11 1,5" fill="#0A0A08"/></svg></div>
    Chamber<em>.</em>
  </a>
  <div class="nav-actions">
    <button class="nav-btn" onclick="printReport()">🖨 Print</button>
    <button class="nav-btn" onclick="copyShareLink()">🔗 Copy Link</button>
    <a href="login.html" class="nav-btn primary">Try Chamber Free →</a>
  </div>
</nav>

<!-- EXPORT TOOLBAR -->
<div class="export-bar no-print" id="export-bar" style="display:none">
  <span class="export-bar-label">Export as:</span>
  <button class="nav-btn" onclick="downloadJSON()">⬇ JSON</button>
  <button class="nav-btn" onclick="downloadCSV()">⬇ CSV</button>
  <button class="nav-btn" onclick="printReport()">⬇ PDF (Print)</button>
  <div style="margin-left:auto;font-size:11px;font-family:var(--fm);color:var(--text3)" id="report-timestamp"></div>
</div>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading report…</div>
</div>

<div id="error-state">
  <div class="err-icon">🔒</div>
  <div class="err-title" id="err-title">Report not found</div>
  <div class="err-sub" id="err-sub">This report may have been deleted or the link has expired.</div>
  <br/>
  <a href="index.html" class="nav-btn" style="text-decoration:none;display:inline-flex">← Back to Chamber</a>
</div>

<div id="report-content"></div>

<script>
const API_BASE = window.location.hostname==='localhost' ? 'http://localhost:3001' : 'https://your-api.com';
let _report = null;

async function init() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const id    = params.get('id');

  if (!token && !id) { showError('No report link', 'Share a valid Chamber report link to view it here.'); return; }

  try {
    let data;
    if (token) {
      // Public share by token
      const res = await fetch(`${API_BASE}/api/share/${token}`);
      if (!res.ok) throw new Error('Not found');
      data = await res.json();
    } else {
      // Direct report ID (must be marked shared=true)
      const res = await fetch(`${API_BASE}/api/share/by-id/${id}`);
      if (!res.ok) throw new Error('Not found');
      data = await res.json();
    }
    _report = data.report || data;
    renderReport(_report);
  } catch(e) {
    showError('Report not available', 'This report may have been deleted or is set to private.');
  }
}

function showError(title, sub) {
  document.getElementById('loader').style.display='none';
  const es = document.getElementById('error-state');
  es.style.display='flex';
  document.getElementById('err-title').textContent=title;
  document.getElementById('err-sub').textContent=sub;
}

function renderReport(r) {
  document.getElementById('loader').style.display='none';
  document.getElementById('export-bar').style.display='flex';
  document.getElementById('report-timestamp').textContent = r.created_at ? `Analyzed ${new Date(r.created_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}` : '';

  // Update page title
  document.title = `${r.product_name||'Product'} Analysis — Chamber`;

  // Meta
  const metaDesc = document.createElement('meta');
  metaDesc.name='description';
  metaDesc.content=`AI product intelligence report for ${r.product_name}. Growth score: ${r.growth_score}/100.`;
  document.head.appendChild(metaDesc);

  const sc = r.growth_score||0;
  const scoreColor = sc>=80?'var(--accent)':sc>=60?'var(--amber)':'var(--red)';
  const pct = sc+'%';

  const container = document.getElementById('report-content');
  container.style.display='block';

  // ── HERO
  let heroHTML = `<div class="report-hero fu">
    <div class="hero-inner">
      <div class="hero-badge"><div class="badge-dot"></div>Chamber AI Report</div>
      <div class="hero-top">
        <div style="flex:1">
          <div class="hero-product">${r.product_name||r.product||'Product Analysis'}</div>
          <div class="hero-category">${r.product_category||r.category||''} ${r.target_audience?'· '+r.target_audience:''}</div>
        </div>
        <div class="score-ring" style="--score-pct:${pct}">
          <div class="score-num" style="color:${scoreColor}">${sc}</div>
          <div class="score-label">Growth Score</div>
        </div>
      </div>`;

  if (r.score_breakdown) {
    heroHTML += `<div class="score-bars">`;
    Object.entries(r.score_breakdown).forEach(([k,v])=>{
      heroHTML += `<div class="score-bar-item">
        <div class="sbi-label">${k.replace(/_/g,' ')}</div>
        <div class="sbi-val">${v}</div>
        <div class="sbi-track"><div class="sbi-fill" style="width:${v}%"></div></div>
      </div>`;
    });
    heroHTML += `</div>`;
  }
  heroHTML += `</div></div>`;

  // ── GRID
  let gridHTML = `<div class="report-grid fu">`;

  // Summary
  if (r.summary) {
    gridHTML += card('wide','📋','Executive Summary',`<div class="summary-text">"${r.summary}"</div>`);
  }

  // Marketing Angles
  if (r.marketing_angles?.length) {
    const body = r.marketing_angles.map((a,i)=>`
      <div class="angle-item">
        <div class="angle-num">0${i+1}</div>
        <div style="flex:1">
          <div class="angle-title">${a.title}</div>
          <div class="angle-desc">${a.description}</div>
          ${a.strength?`<div class="angle-bar"><div class="angle-fill" style="width:${a.strength*20}%"></div></div>`:''}
        </div>
      </div>`).join('');
    gridHTML += card('wide','🎯','Marketing Angles',body);
  }

  // Competitors
  if (r.competitors?.length) {
    const body = r.competitors.map(c=>{
      const tClass = c.threat_level>=7?'threat-high':c.threat_level>=4?'threat-mid':'threat-low';
      const tLabel = c.threat_level>=7?'High threat':c.threat_level>=4?'Med threat':'Low threat';
      return `<div class="comp-item">
        <div class="comp-head">
          <div class="comp-name">${c.name}</div>
          <span class="comp-threat ${tClass}">${tLabel} ${c.threat_level}/10</span>
        </div>
        <div class="comp-price">${c.price}</div>
        <div class="comp-gap">Gap: ${c.weakness}</div>
      </div>`;
    }).join('');
    gridHTML += card('','🔍','Competitor Analysis',body);
  }

  // Reddit Sentiment
  if (r.reddit_sentiment) {
    const s = r.reddit_sentiment;
    const body = `<div class="sentiment-bars">
      ${[{l:'Positive',v:s.positive,c:'var(--accent)'},{l:'Neutral',v:s.neutral,c:'var(--text3)'},{l:'Negative',v:s.negative,c:'var(--red)'}].map(b=>`
        <div class="sent-row">
          <div class="sent-label">${b.l}</div>
          <div class="sent-track"><div style="height:100%;background:${b.c};width:${b.v}%;border-radius:3px"></div></div>
          <div class="sent-pct" style="color:${b.c}">${b.v}%</div>
        </div>`).join('')}
    </div>
    ${s.key_themes?.length?`<div class="themes">${s.key_themes.map(t=>`<span class="theme-tag">${t}</span>`).join('')}</div>`:''}
    ${s.sample_posts?.slice(0,2).map(p=>`<div class="reddit-post">r/${p.subreddit} · ↑${p.upvotes}<br/>"${(p.text||'').slice(0,90)}…"</div>`).join('')||''}`;
    gridHTML += card('','📊','Reddit Sentiment',body);
  }

  // Influencers
  if (r.influencers?.length) {
    const body = r.influencers.slice(0,5).map(inf=>`
      <div class="inf-item">
        <div class="inf-emoji">${inf.emoji||'👤'}</div>
        <div style="flex:1;min-width:0">
          <div class="inf-handle">${inf.handle}</div>
          <div class="inf-meta">${inf.platform} · ${inf.followers} · ${inf.niche}</div>
        </div>
        <div class="inf-score">${inf.match_score}%</div>
      </div>`).join('');
    gridHTML += card('','🤳','Influencer Matches',body);
  }

  // Keywords
  if (r.keywords?.length) {
    const body = `<div class="kw-grid">${r.keywords.slice(0,8).map(k=>`
      <div class="kw-item">
        <div class="kw-word">${k.keyword}<span class="kw-diff diff-${k.difficulty?.toLowerCase()}">${k.difficulty}</span></div>
        <div class="kw-meta">${k.volume||''} vol · ${k.opportunity||''}% opp</div>
      </div>`).join('')}</div>`;
    gridHTML += card('wide','🔑','SEO Keywords',body);
  }

  // Market size
  if (r.market_size) {
    const m = r.market_size;
    const body = `<div class="market-grid">
      ${[['TAM',m.tam],['SAM',m.sam],['SOM',m.som]].map(([l,v])=>`
        <div class="market-item"><div class="market-num">${v||'—'}</div><div class="market-label">${l}</div></div>`).join('')}
    </div>
    <div style="font-size:11px;font-family:var(--fm);color:var(--text3)">Growth rate: ${m.growth_rate||'—'}</div>`;
    gridHTML += card('','🌐','Market Size',body);
  }

  // Action plan
  if (r.actionable_tips?.length) {
    const body = `<ul class="action-list">${r.actionable_tips.map(t=>`<li>${t}</li>`).join('')}</ul>`;
    gridHTML += card('','💡','Action Plan',body);
  }

  gridHTML += `</div>`;

  // FOOTER
  const footerHTML = `<div class="report-footer no-print">
    <div>
      <div class="footer-cta">Analysis powered by <span>Chamber.</span></div>
      <div style="margin-top:4px;color:var(--text3)">AI product intelligence for DTC founders</div>
    </div>
    <a href="https://chamber.app" class="nav-btn primary" style="text-decoration:none">Get your free analysis →</a>
  </div>`;

  container.innerHTML = heroHTML + gridHTML + footerHTML;

  // Animate bars after paint
  setTimeout(()=>{
    document.querySelectorAll('.sbi-fill').forEach(el=>{
      const w = el.style.width; el.style.width='0';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.width=w; }));
    });
  }, 100);
}

function card(extra, icon, title, body) {
  return `<div class="report-card ${extra}">
    <div class="rc-head"><span class="rc-icon">${icon}</span>${title}</div>
    <div class="rc-body">${body}</div>
  </div>`;
}

function printReport() { window.print(); }

function copyShareLink() {
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const btn = event.currentTarget;
    btn.textContent='✓ Copied!';
    setTimeout(()=>btn.textContent='🔗 Copy Link',2000);
  });
}

function downloadJSON() {
  if (!_report) return;
  const blob = new Blob([JSON.stringify(_report, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `chamber-${(_report.product_name||'report').replace(/\s+/g,'-').toLowerCase()}.json`;
  a.click();
}

function downloadCSV() {
  if (!_report) return;
  const rows = [['Field','Value']];
  const flat = (obj, prefix='') => {
    Object.entries(obj||{}).forEach(([k,v])=>{
      if (typeof v === 'string'||typeof v==='number') rows.push([prefix+k, String(v).replace(/,/g,';')]);
      else if (Array.isArray(v)) rows.push([prefix+k, v.map(i=>typeof i==='string'?i:JSON.stringify(i)).join(' | ')]);
      else if (typeof v==='object'&&v) flat(v, prefix+k+'.');
    });
  };
  flat(_report);
  const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`chamber-${(_report.product_name||'report').replace(/\s+/g,'-').toLowerCase()}.csv`;
  a.click();
}
