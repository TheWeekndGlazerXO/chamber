<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chamber · Admin Analytics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0A08;--bg2:#111110;--bg3:#1A1A18;--bg4:#222220;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#F0EEE6;--text2:#8A8880;--text3:#555450;--accent:#C8F04A;--red:#FF5C3A;--amber:#FFB830;--teal:#3AFFD4;--purple:#7B61FF;--fd:'Syne',sans-serif;--fm:'DM Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--fd);-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.sb{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50}
.sb-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.logo{font-size:16px;font-weight:800;display:flex;align-items:center;gap:7px}
.logo-mark{width:24px;height:24px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center}
.logo em{color:var(--accent);font-style:normal}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-sec{font-size:10px;font-family:var(--fm);color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:12px 8px 5px}
.si{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;color:var(--text2)}
.si:hover{background:var(--bg3);color:var(--text)}
.si.act{background:rgba(200,240,74,.1);color:var(--accent)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-left:auto;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sb-bot{padding:10px 10px;border-top:1px solid var(--border)}
.main{flex:1;margin-left:220px;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:58px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;background:rgba(10,10,8,.92);backdrop-filter:blur(16px);z-index:40;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:12px}
.tb-title{font-size:14px;font-weight:700}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-family:var(--fm);padding:3px 9px;border-radius:100px}
.badge-live{background:rgba(200,240,74,.08);border:1px solid rgba(200,240,74,.2);color:var(--accent)}
.badge-mock{background:rgba(255,184,48,.08);border:1px solid rgba(255,184,48,.2);color:var(--amber)}
.badge-err{background:rgba(255,92,58,.08);border:1px solid rgba(255,92,58,.2);color:var(--red)}
.tb-r{display:flex;align-items:center;gap:8px}

/* DATA TOGGLE */
.data-toggle{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;font-family:var(--fm);cursor:pointer;color:var(--text2);transition:all .2s}
.data-toggle:hover{border-color:var(--border2)}
.data-toggle.real{border-color:rgba(200,240,74,.3);color:var(--accent)}
.toggle-dot{width:8px;height:8px;border-radius:50%}

.btn-sm{font-size:11px;font-family:var(--fm);font-weight:600;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.btn-sm:hover{color:var(--text);border-color:var(--border2)}
.btn-accent{background:var(--accent);color:#0A0A08;border-color:var(--accent)}
.btn-accent:hover{background:#A8D030}
select.date-sel{font-size:11px;font-family:var(--fm);background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text2);cursor:pointer;outline:none}

.content{padding:24px;overflow-y:auto;flex:1}

/* METRICS */
.metrics-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;transition:border-color .2s;position:relative;overflow:hidden}
.mc:hover{border-color:var(--border2)}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .3s}
.mc:hover::before{opacity:.4}
.mc-label{font-size:10px;font-family:var(--fm);color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.mc-val{font-size:22px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.mc-sub{font-size:11px;font-family:var(--fm)}
.pos{color:var(--accent)}.neg{color:var(--red)}.neu{color:var(--amber)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700}
.card-body{padding:18px}
.chart-wrap{height:200px;position:relative}

/* TABLES */
.dt{width:100%;border-collapse:collapse;font-size:12px}
.dt th{padding:8px 14px;text-align:left;font-size:10px;font-family:var(--fm);color:var(--text3);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:400}
.dt td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:rgba(255,255,255,.015)}
.plan-pill{font-size:9px;font-family:var(--fm);font-weight:700;padding:2px 7px;border-radius:100px}
.pp-free{background:rgba(85,84,80,.3);color:#555450}
.pp-starter{background:rgba(138,136,128,.2);color:#8A8880}
.pp-growth{background:rgba(200,240,74,.1);color:var(--accent)}
.pp-scale{background:rgba(58,255,212,.1);color:var(--teal)}
.pp-cancelled{background:rgba(255,92,58,.1);color:var(--red)}
.evt-pill{font-size:9px;font-family:var(--fm);font-weight:700;padding:2px 7px;border-radius:100px}
.ep-signup{background:rgba(200,240,74,.1);color:var(--accent)}
.ep-analyze{background:rgba(58,255,212,.1);color:var(--teal)}
.ep-upgrade{background:rgba(123,97,255,.1);color:var(--purple)}
.ep-churn{background:rgba(255,92,58,.1);color:var(--red)}
.ep-feature_used{background:rgba(255,184,48,.1);color:var(--amber)}
.ep-signin{background:rgba(138,136,128,.15);color:#8A8880}

/* VIRAL */
.search-box{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:12px;font-family:var(--fd);color:var(--text);outline:none;min-width:180px}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--text3)}
.filter-btn{font-size:11px;font-family:var(--fd);font-weight:600;padding:7px 12px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.filter-btn:hover{color:var(--text)}
.filter-btn.act{background:rgba(200,240,74,.1);color:var(--accent);border-color:var(--accent)}
.vcard{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:16px;margin-bottom:10px}
.vcard:hover{border-color:var(--border2)}
.vcard-head{display:flex;gap:10px;margin-bottom:10px}
.vicon{width:34px;height:34px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.vtitle{font-size:13px;font-weight:600;line-height:1.4}
.vsrc{font-size:10px;font-family:var(--fm);color:var(--text3);margin-top:3px}
.vscore{font-size:20px;font-weight:800;color:var(--accent);text-align:right;min-width:36px}
.vtags{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.vtag{font-size:10px;font-family:var(--fm);padding:2px 8px;border-radius:100px;margin-right:5px;margin-bottom:4px;display:inline-block}
.vt1{background:rgba(200,240,74,.08);color:var(--accent)}
.vt2{background:rgba(58,255,212,.08);color:var(--teal)}
.vt3{background:rgba(123,97,255,.08);color:var(--purple)}

/* LOADING */
.spinner-sm{width:12px;height:12px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-bar-wrap{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-bottom:16px}
.loading-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));width:0;border-radius:1px;transition:width .4s}

/* FUNNEL */
.funnel-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.funnel-lbl{width:180px;font-size:11px;font-family:var(--fm);color:var(--text2);text-align:right;flex-shrink:0}
.funnel-track{flex:1;height:30px;background:var(--bg4);border-radius:5px;overflow:hidden}
.funnel-fill{height:100%;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;font-family:var(--fm);border-radius:5px;color:#0A0A08;transition:width 1s ease}
.funnel-pct{width:48px;font-size:11px;font-family:var(--fm);color:var(--accent);text-align:right}

/* COHORT */
.cohort-table{width:100%;border-collapse:collapse;font-size:11px}
.cohort-table th{padding:6px 8px;text-align:center;font-family:var(--fm);color:var(--text3);font-weight:400;font-size:9px}
.cohort-table td{padding:4px 3px;text-align:center;border-radius:4px}
.cohort-table td:first-child{text-align:left;color:var(--text2);font-family:var(--fm);padding-left:8px}

/* STATUS */
#data-status{font-size:11px;font-family:var(--fm);padding:3px 8px;border-radius:5px}
.err-banner{background:rgba(255,92,58,.08);border:1px solid rgba(255,92,58,.2);border-radius:8px;padding:12px 16px;font-size:12px;font-family:var(--fm);color:var(--red);margin-bottom:16px}
<style id="affiliate-styles-to-add">
/* AFFILIATE TAB */
.aff-create-form{background:rgba(200,240,74,.04);border:1px solid rgba(200,240,74,.12);border-radius:10px;padding:20px;margin-bottom:20px}
.aff-create-form h3{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--accent)}
.aff-form-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end}
.aff-input{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:12px;font-family:var(--fd);color:var(--text);outline:none;width:100%}
.aff-input:focus{border-color:var(--accent)}
.aff-input::placeholder{color:var(--text3)}
.aff-input-label{font-size:9px;font-family:var(--fm);color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
 
.aff-code-box{background:var(--bg3);border:1px solid rgba(200,240,74,.2);border-radius:8px;padding:9px 14px;font-size:14px;font-weight:700;font-family:var(--fm);color:var(--accent);letter-spacing:2px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.aff-code-box:hover{background:var(--adim)}
 
.aff-row-clickable{cursor:pointer}
.aff-row-clickable:hover td{background:rgba(200,240,74,.04) !important}
.aff-row-expanded td{background:rgba(200,240,74,.03) !important}
 
/* AFFILIATE DETAIL MODAL */
.aff-detail{background:var(--bg2);border:1px solid rgba(200,240,74,.2);border-radius:12px;padding:24px;margin-top:0;margin-bottom:16px;display:none}
.aff-detail.open{display:block}
.aff-detail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.aff-detail-name{font-size:18px;font-weight:800;letter-spacing:-.3px}
.aff-detail-code{font-size:11px;font-family:var(--fm);color:var(--accent);margin-top:3px}
.aff-detail-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.aff-dm{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.aff-dm-val{font-size:20px;font-weight:800;letter-spacing:-1px;color:var(--accent)}
.aff-dm-lbl{font-size:9px;font-family:var(--fm);color:var(--text3);margin-top:3px;letter-spacing:.04em;text-transform:uppercase}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.sd-active{background:#C8F04A}
.sd-paused{background:#FFB830}
.sd-terminated{background:#FF5C3A}
</style>
</style>
</head>
<body>

<aside class="sb">
  <div class="sb-logo">
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 16 16" fill="none" width="10" height="10"><polygon points="8,1 15,5 15,11 8,15 1,11 1,5" fill="#0A0A08"/></svg></div>
      Chamber<em>.</em>
    </div>
  </div>
  <div class="sb-nav">
    <div class="sb-sec">Analytics</div>
    <div class="si act" onclick="showTab('overview',this)">📊 Overview</div>
    <div class="si" onclick="showTab('users',this)">👥 Users</div>
    <div class="si" onclick="showTab('revenue',this)">💰 Revenue</div>
    <div class="si" onclick="showTab('reports',this)">📄 Reports</div>
    <div class="si" onclick="showTab('funnel',this)">🔽 Funnel</div>
    <div class="si" onclick="showTab('retention',this)">🔄 Retention</div>
    <div class="sb-sec">Tools</div>
    <div class="si" onclick="showTab('viral',this)">⚡ Viral Scraper <div class="live-dot"></div></div>
    <div class="si" onclick="showTab('events',this)">📡 Live Events</div>
    <div class="sb-sec">Revenue</div>
    <div class="si" onclick="showTab('affiliates',this)">🤝 Affiliates</div>
  </div>
  <div class="sb-bot">
    <div style="font-size:10px;font-family:var(--fm);color:var(--text3);padding:8px">
      <a href="app.html" style="color:var(--accent);text-decoration:none">← Back to app</a>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="tb-l">
      <div class="tb-title" id="page-title">Overview</div>
      <span class="badge badge-live" id="data-badge"><span class="live-dot" style="width:5px;height:5px;background:var(--accent)"></span>Live data</span>
    </div>
    <div class="tb-r">
      <!-- REAL / PLACEHOLDER TOGGLE -->
      <div class="data-toggle real" id="data-toggle" onclick="toggleDataMode()" title="Toggle real vs placeholder data">
        <div class="toggle-dot" id="toggle-dot" style="background:var(--accent)"></div>
        <span id="toggle-label">Real data</span>
      </div>
      <select class="date-sel" id="date-sel" onchange="setDays(+this.value);refresh()">
        <option value="7">7 days</option>
        <option value="30" selected>30 days</option>
        <option value="90">90 days</option>
      </select>
      <button class="btn-sm" onclick="refresh()" id="refresh-btn">↻ Refresh</button>
      <button class="btn-sm btn-accent" onclick="window.print()">↓ Export</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script id="affiliate-script-to-add">
 
    // ── AFFILIATES TAB ─────────────────────────────────────────────
    async function renderAffiliates() {
      const el = document.getElementById('content');
      el.innerHTML = `
        <!-- CREATE FORM -->
        <div class="aff-create-form">
          <h3>➕ Create New Affiliate</h3>
          <div class="aff-form-grid">
            <div>
              <div class="aff-input-label">Full Name *</div>
              <input class="aff-input" id="aff-name" placeholder="e.g. John Doe" />
            </div>
            <div>
              <div class="aff-input-label">Email</div>
              <input class="aff-input" id="aff-email" type="email" placeholder="john@example.com" />
            </div>
            <div>
              <div class="aff-input-label">Commission %</div>
              <input class="aff-input" id="aff-pct" type="number" placeholder="25" value="25" min="1" max="50" />
            </div>
            <button onclick="createAffiliate()" class="btn-sm btn-accent" style="white-space:nowrap;padding:9px 16px;font-family:var(--fd);font-weight:700;font-size:12px;background:var(--accent);color:#0A0A08;border:none;border-radius:7px;cursor:pointer;transition:all .2s" onmouseover="this.style.background='#A8D030'" onmouseout="this.style.background='var(--accent)'">
              Create Affiliate →
            </button>
          </div>
          <div style="margin-top:10px;font-size:11px;font-family:var(--fm);color:var(--text3)">
            A unique affiliate link will be generated: <code style="color:var(--accent)">yourapp.com/login.html?ref=AFF-NAME-XXXX</code>
            — When used, user gets <strong style="color:var(--accent)">50% off first month</strong>, affiliate earns <strong style="color:var(--teal)">25% monthly commission</strong>.
          </div>
        </div>
     
        <!-- NEW AFFILIATE RESULT -->
        <div id="new-aff-result"></div>
     
        <!-- AFFILIATES TABLE -->
        <div class="card">
          <div class="card-head">🤝 All Affiliates
            <div style="display:flex;gap:6px">
              <button onclick="renderAffiliates()" class="btn-sm" style="font-family:var(--fd)">↻ Refresh</button>
            </div>
          </div>
          <div id="aff-table-wrap">
            <div style="padding:40px;text-align:center;color:var(--text3);font-family:var(--fm);font-size:12px">
              <div class="spinner-sm"></div>&nbsp; Loading affiliates…
            </div>
          </div>
        </div>
      `;
     
      await loadAffiliatesTable();
    }
     
    async function loadAffiliatesTable() {
      const wrap = document.getElementById('aff-table-wrap');
      if (!wrap) return;
      try {
        const data = await api('/api/admin/affiliates');
        const affs = data.affiliates || [];
     
        if (!affs.length) {
          wrap.innerHTML = `<div style="padding:48px;text-align:center;color:var(--text3);font-family:var(--fm);font-size:12px">No affiliates yet — create one above</div>`;
          return;
        }
     
        wrap.innerHTML = `<div style="overflow-x:auto"><table class="dt">
          <thead><tr>
            <th>Name</th><th>Code / Link</th><th>Signups</th>
            <th>MRR Generated</th><th>Pending Commission</th><th>Paid Commission</th>
            <th>Status</th><th>Commission %</th><th>Created</th><th></th>
          </tr></thead>
          <tbody id="aff-tbody"></tbody>
        </table></div>`;
     
        const tbody = document.getElementById('aff-tbody');
        affs.forEach(a => {
          const statusColor = a.status==='active'?'var(--accent)':a.status==='paused'?'var(--amber)':'var(--red)';
          const row = document.createElement('tr');
          row.className = 'aff-row-clickable';
          row.id = `aff-row-${a.id}`;
          row.innerHTML = `
            <td style="font-weight:700">${a.name}<br><span style="font-size:10px;color:var(--text3);font-weight:400">${a.email||'—'}</span></td>
            <td>
              <div class="aff-code-box" onclick="event.stopPropagation();copyAffCode('${a.code}','${window.location.origin}')" title="Click to copy affiliate link">
                ${a.code} 📋
              </div>
            </td>
            <td style="font-family:var(--fm);font-weight:700;color:var(--teal)">${a.total_signups||0}</td>
            <td style="font-family:var(--fm);color:var(--accent)">$${(+a.total_mrr_generated||0).toFixed(0)}</td>
            <td style="font-family:var(--fm);color:var(--amber)">$${(+a.pending_commission||0).toFixed(2)}</td>
            <td style="font-family:var(--fm);color:var(--text2)">$${(+a.paid_commission||0).toFixed(2)}</td>
            <td><span style="font-family:var(--fm);font-size:10px;font-weight:700;color:${statusColor}">
              <span class="status-dot sd-${a.status}"></span>${(a.status||'active').toUpperCase()}
            </span></td>
            <td style="font-family:var(--fm);color:var(--accent)">${a.commission_pct}%</td>
            <td style="font-family:var(--fm);font-size:10px;color:var(--text3)">${a.created_at?new Date(a.created_at).toLocaleDateString():'—'}</td>
            <td><button onclick="event.stopPropagation();toggleAffDetail('${a.id}')" style="font-size:10px;font-family:var(--fm);padding:4px 9px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer" id="aff-toggle-${a.id}">Details ▼</button></td>
          `;
          row.onclick = () => toggleAffDetail(a.id);
          tbody.appendChild(row);
     
          // Detail row (hidden)
          const detailRow = document.createElement('tr');
          detailRow.id = `aff-detail-row-${a.id}`;
          detailRow.innerHTML = `<td colspan="10" style="padding:0"><div class="aff-detail" id="aff-detail-${a.id}"></div></td>`;
          tbody.appendChild(detailRow);
        });
     
      } catch(e) {
        wrap.innerHTML = `<div style="padding:20px;color:var(--red);font-family:var(--fm);font-size:12px">Error: ${e.message}</div>`;
      }
    }
     
    async function toggleAffDetail(id) {
      const panel  = document.getElementById(`aff-detail-${id}`);

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG — change these to match your .env
// ═══════════════════════════════════════════════════════════
const API_BASE     = window.location.hostname === 'localhost' ? 'http://localhost:3001' : 'https://your-api.com';
const ADMIN_SECRET = 'change_me_admin_secret'; // must match ADMIN_SECRET in .env

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let useRealData  = true;
let currentTab   = 'overview';
let days         = 30;
let charts       = {};
let liveInterval;
let realOverview = null;  // cached real data

// ═══════════════════════════════════════════════════════════
// TOGGLE
// ═══════════════════════════════════════════════════════════
function toggleDataMode() {
  useRealData = !useRealData;
  const tog   = document.getElementById('data-toggle');

    badge.innerHTML = '<span style="width:5px;height:5px;border-radius:50%;background:var(--accent)"></span> Live data';
  } else {
    tog.classList.remove('real');
    dot.style.background = 'var(--amber)';
    lbl.textContent = 'Placeholder';
    badge.className = 'badge badge-mock';
    badge.innerHTML = '🎭 Demo data';
  }
  refresh();
}

function setDays(d) { days = d; }

function refresh() {
  clearInterval(liveInterval);
  Object.values(charts).forEach(c => { try { c.destroy(); } catch {} });
  charts = {};
  document.getElementById('content').innerHTML = '';
  const tab = currentTab;
  currentTab = '';
  const el = document.querySelector(`.si.act`);
  showTab(tab, el);
}

// ═══════════════════════════════════════════════════════════
// API HELPER (sends admin secret header)
// ═══════════════════════════════════════════════════════════
async function api(path) {
  const token = localStorage.getItem('chamber_token') || '';
  const headers = { 'x-admin-secret': ADMIN_SECRET };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API_BASE + path, { headers });
  if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
  return res.json();
}

// ═══════════════════════════════════════════════════════════
// PLACEHOLDER DATA GENERATORS
// ═══════════════════════════════════════════════════════════
function rnd(base, growth, noise, n) {
  return Array.from({length:n},(_,i)=>{
    const t = base * Math.pow(1+growth/n,i);
    return Math.max(0,Math.round(t + (Math.random()-.5)*noise*t));
  });
}
function dates(n) {
  return Array.from({length:n},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-n+i+1);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  });
}
const MOCK_OVERVIEW = {mrr:4821,arr:57852,total_users:4821,paying_users:1446,free_users:3375,starter_count:480,growth_count:720,scale_count:246,new_signups:288,new_reports:1140,total_reports:12480,conversion_rate:30.0,period_days:30};

// ═══════════════════════════════════════════════════════════
// CHART DEFAULTS
// ═══════════════════════════════════════════════════════════
const CB = {
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(17,17,16,.95)',titleColor:'#F0EEE6',bodyColor:'#8A8880',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleFont:{family:'DM Mono',size:10},bodyFont:{family:'DM Mono',size:10},padding:10}},
  scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#555450',font:{family:'DM Mono',size:9},maxTicksLimit:8}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#555450',font:{family:'DM Mono',size:9}}}}
};
function grad(ctx,c1,c2='rgba(0,0,0,0)'){const g=ctx.createLinearGradient(0,0,0,200);g.addColorStop(0,c1);g.addColorStop(1,c2);return g;}
const fmt = n=>n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1e3?'$'+(n/1e3).toFixed(1)+'k':'$'+Math.round(n).toLocaleString();
const fmtN = n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':Math.round(n).toLocaleString();

// ═══════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════
function showTab(key, el) {
  currentTab = key;
  document.querySelectorAll('.si').forEach(s=>s.classList.remove('act'));
  if (el) el.classList.add('act');
  document.getElementById('page-title').textContent = {overview:'Overview',users:'Users',revenue:'Revenue',reports:'Reports',funnel:'Funnel',retention:'Retention',viral:'Viral Scraper',affiliates:'Affiliates',events:'Live Events'}[key]||key;
  clearInterval(liveInterval);
  Object.values(charts).forEach(c=>{try{c.destroy()}catch{}});
  charts={};
  document.getElementById('content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3);font-family:var(--fm);font-size:12px"><div class="spinner-sm"></div>&nbsp; Loading…</div>';
  ({overview:renderOverview,users:renderUsers,revenue:renderRevenue,reports:renderReports,funnel:renderFunnel,affiliates:renderAffiliates,retention:renderRetention,viral:renderViral,events:renderEvents}[key]||renderOverview)();
}

async function renderUsers() {
  let users = [], total = 0, err = '';
  if (useRealData) {

  function addEv(){
    const t=TYPES[Math.floor(Math.random()*TYPES.length)];
    const u=USERS[Math.floor(Math.random()*USERS.length)];
    const p=PRODS[Math.floor(Math.random()*PRODS.length)];
    if(cnt[t]!==undefined)cnt[t]++;
    document.getElementById('ev-total').textContent=fmtN(Object.values(cnt).reduce((a,b)=>a+b,0));
    document.getElementById('ev-sig').textContent=cnt.signup;
    document.getElementById('ev-ana').textContent=cnt.analyze;
    document.getElementById('ev-upg').textContent=cnt.upgrade;
    document.getElementById('ev-chr').textContent=cnt.churn;
    const row=document.createElement('tr');
    row.innerHTML=`<td style="font-family:var(--fm);font-size:10px;color:var(--text3)">${new Date().toLocaleTimeString()}</td><td><span class="evt-pill ep-${t}">${t.toUpperCase()}</span></td><td style="font-family:var(--fm);font-size:11px;color:var(--text2)">${u}</td><td style="font-size:11px;color:var(--text3)">${t==='analyze'?`product: ${p}`:t==='upgrade'?'→ Growth Plan':'new event'}</td>`;
    const tbody=document.getElementById('ev-tbody');
    if(tbody){tbody.insertBefore(row,tbody.firstChild);if(tbody.children.length>50)tbody.removeChild(tbody.lastChild);}
  }
  for(let i=0;i<8;i++) addEv();
  liveInterval=setInterval(addEv,1500+Math.random()*500);
}

// HELPERS
// ═══════════════════════════════════════════════════════════
function timeAgo(ts) {
  const s=Math.round((Date.now()-new Date(ts))/1000);
  if(s<60) return s+'s ago';
  if(s<3600) return Math.round(s/60)+'m ago';
  if(s<86400) return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago';
}
